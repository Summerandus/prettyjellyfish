---
layout: default
---
<style>
  /* ── WORK ── */
  .work-wrapper { max-width: 900px; margin: 0 auto; padding: 160px 48px 120px; }

  .work-back { font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-dim); text-decoration: none; transition: color 0.3s; display: inline-block; margin-bottom: 60px; }
  .work-back::before { content: '← '; }
  .work-back:hover { color: var(--accent); }

  .work-header { margin-bottom: 60px; }
  .work-header-meta { font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-dim); opacity: 0.6; margin-bottom: 20px; }
  .work-header h1 { font-family: var(--font-display); font-size: clamp(40px, 6vw, 80px); font-weight: 300; font-style: italic; color: var(--text); line-height: 1.05; letter-spacing: -0.01em; }

  .work-cover { width: 100%; aspect-ratio: 16/9; background: linear-gradient(135deg, rgba(168,197,212,0.06) 0%, rgba(168,197,212,0.02) 100%); margin-bottom: 80px; display: flex; align-items: center; justify-content: center; border: 1px solid var(--border); overflow: hidden; }
  .work-cover img { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; }
  .work-cover-placeholder { font-family: var(--font-display); font-size: 14px; font-style: italic; color: var(--text-dim); opacity: 0.3; letter-spacing: 0.1em; }

  .work-body { font-family: var(--font-display); font-size: 19px; font-weight: 300; line-height: 1.85; color: var(--text-dim); }
  .work-body p { margin-bottom: 1.6em; }
  .work-body p:first-child { font-size: 22px; color: var(--text); }
  .work-body h2 { font-family: var(--font-display); font-size: 28px; font-weight: 300; font-style: italic; color: var(--text); margin: 2em 0 0.8em; }
  .work-body h3 { font-family: var(--font-body); font-size: 12px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-dim); margin: 2em 0 0.8em; }
  .work-body blockquote { border-left: 1px solid rgba(168,197,212,0.25); padding-left: 24px; margin: 2em 0; color: var(--accent); font-style: italic; }
  .work-body a { color: var(--accent); text-decoration: none; border-bottom: 1px solid rgba(168,197,212,0.3); }
  .work-body hr { border: none; border-top: 1px solid var(--border); margin: 3em 0; }

  @media (max-width: 900px) { .work-wrapper { padding: 120px 32px 80px; } }
  @media (max-width: 600px) { .work-wrapper { padding: 100px 20px 60px; } .work-body { font-size: 17px; } }
</style>

<div class="work-wrapper">
  <a class="work-back" href="/#work" data-en="work" data-zh="作品">work</a>
  <header class="work-header">
    <p class="work-header-meta">{{ page.desc }}</p>
    <h1 data-en="{{ page.title }}"{% if page.title_zh %} data-zh="{{ page.title_zh }}"{% endif %}>{{ page.title }}</h1>
  </header>
  <div class="work-cover">
    {% if page.image %}<img src="{{ page.image }}" alt="{{ page.title }}">
    {% else %}<span class="work-cover-placeholder">— image coming —</span>{% endif %}
  </div>
  <div class="work-body">{{ content }}</div>
</div>
