<meta charset="UTF-8">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🪼</text></svg>">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% if page.title %}{{ page.title }} — prettyjellyfish{% else %}prettyjellyfish{% endif %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Jost:wght@300;400;500&family=LXGW+WenKai+Mono+TC&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #07090f;
    --bg2: #0c0f1a;
    --text: #d4cfc8;
    --text-dim: #7a7870;
    --accent: #a8c5d4;
    --accent2: #8fb3c5;
    --border: rgba(168, 197, 212, 0.12);
    --font-display: 'Cormorant Garamond', 'LXGW WenKai Mono TC', serif;
    --font-body: 'Jost', 'LXGW WenKai Mono TC', sans-serif;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    font-weight: 300;
    font-size: 16px;
    line-height: 1.75;
    cursor: none;
    overflow-x: hidden;
  }

  /* ── CANVAS ── */
  #bg {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
    pointer-events: none;
  }

  /* ── CUSTOM CURSOR ── */
  #cursor-dot, #cursor-ring {
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    transition: opacity 0.3s;
  }
  #cursor-dot {
    width: 5px; height: 5px;
    background: var(--accent);
    top: 0; left: 0;
  }
  #cursor-ring {
    width: 28px; height: 28px;
    border: 1px solid rgba(168, 197, 212, 0.5);
    top: 0; left: 0;
    transition: width 0.2s, height 0.2s, border-color 0.2s;
  }

  /* ── BILINGUAL BLOCKS ── */
  .lang-zh { display: none; }

  /* ── LAYOUT ── */
  #page {
    position: relative;
    z-index: 1;
  }

  /* ── NAV ── */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 28px 48px;
    background: linear-gradient(to bottom, rgba(7,9,15,0.85) 0%, transparent 100%);
    backdrop-filter: blur(0px);
  }

  .nav-logo {
    font-family: var(--font-display);
    font-size: 20px;
    font-weight: 400;
    letter-spacing: 0.12em;
    color: var(--accent);
    text-decoration: none;
  }

  .nav-right {
    display: flex;
    align-items: center;
    gap: 36px;
  }

  .nav-link {
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-dim);
    text-decoration: none;
    transition: color 0.3s;
  }
  .nav-link:hover { color: var(--text); }

  #lang-btn {
    font-family: var(--font-body);
    font-size: 12px;
    font-weight: 400;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-dim);
    background: none;
    border: 1px solid var(--border);
    padding: 6px 14px;
    cursor: none;
    transition: color 0.3s, border-color 0.3s;
  }
  #lang-btn:hover { color: var(--accent); border-color: rgba(168,197,212,0.3); }

  /* ── FOOTER ── */
  footer {
    padding: 80px 48px 60px;
    border-top: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 32px;
    text-align: center;
  }

  .footer-logo {
    font-family: var(--font-display);
    font-size: clamp(48px, 8vw, 110px);
    font-weight: 300;
    font-style: italic;
    color: rgba(168,197,212,0.08);
    letter-spacing: -0.02em;
    line-height: 1;
    user-select: none;
  }

  .footer-contact {
    font-size: 13px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .footer-email {
    font-family: var(--font-display);
    font-size: 18px;
    font-style: italic;
    color: var(--accent);
    letter-spacing: 0.05em;
  }
  .footer-email a { color: inherit; text-decoration: none; }
  .footer-email a:hover { text-decoration: underline; }

  .footer-copy {
    font-size: 12px;
    letter-spacing: 0.12em;
    color: rgba(122,120,112,0.4);
  }

  .divider {
    width: 1px;
    height: 60px;
    background: var(--border);
    margin: 0 auto;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 900px) {
    nav { padding: 24px 32px; }
    footer { padding: 60px 32px 48px; }
  }

  @media (max-width: 600px) {
    body { cursor: auto; font-size: 15px; }
    #cursor-dot, #cursor-ring { display: none; }
    nav { padding: 20px 20px; }
    .nav-right { gap: 20px; }
    .nav-link { display: none; }
    footer { padding: 48px 20px 40px; }
  }
</style>

<style>html[lang="zh"] * { font-style: normal !important; }</style>

{% if page.extra_css %}<style>{{ page.extra_css }}</style>{% endif %}
